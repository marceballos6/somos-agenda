<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Somos — Multiespacio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',system-ui,sans-serif;background:#F9EFE8;color:#1a1010;height:100vh;overflow:hidden}
:root{
  --rosa:#F9EFE8;--rosa-med:#F2D9CE;--rosa-borde:#E8C4B5;--rosa-osc:#D4967A;
  --heart:#E8758A;--negro:#1A1010;--negro-s:#3D2B2B;--gris:#7A6060;--gris-c:#BFA8A0;
  --bg:#F9EFE8;--bg2:#F2D9CE;--bg3:#EDD9CE;
  --border:rgba(180,120,100,.2);--border2:rgba(180,120,100,.4);
  --acc:#E8758A;--acc-bg:#FDEAED;--acc-t:#7A1F38;
  --radius:10px;--radius-lg:16px;
  /* Colores más saturados para mejor visibilidad */
  --c-psi:#FFE066;--c-psi-t:#5C4200;--c-psi-b:#CC8800;
  --c-psped:#6FCF97;--c-psped-t:#0B4A1F;--c-psped-b:#1A8A3E;
  --c-fono:#C39BF5;--c-fono-t:#3A1070;--c-fono-b:#7B2FD4;
  --c-psiq:#F48FB1;--c-psiq-t:#6B0F2A;--c-psiq-b:#C2185B;
  --c-otro:#64B5F6;--c-otro-t:#0A3060;--c-otro-b:#1565C0;
}
input,select,textarea{width:100%;padding:8px 12px;border:.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:#fff8f5;color:var(--negro);outline:none;font-family:'Lato',sans-serif;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--rosa-osc)}
textarea{resize:vertical;min-height:65px}
button{cursor:pointer;border:.5px solid var(--border2);border-radius:var(--radius);padding:7px 13px;font-size:13px;background:#fff8f5;color:var(--negro-s);transition:background .15s,transform .1s;font-family:'Lato',sans-serif}
button:hover{background:var(--bg3)}button:active{transform:scale(.98)}
.btn-primary{background:var(--negro);color:var(--rosa-med);border-color:var(--negro)}
.btn-primary:hover{background:var(--negro-s);color:var(--rosa)}
.btn-danger{background:var(--acc-bg);color:var(--acc-t);border-color:var(--acc)}
.btn-sm{padding:4px 9px;font-size:12px}
.card{background:#fff8f5;border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tag-r{background:var(--rosa-med);color:var(--negro-s)}
.tag-h{background:var(--acc-bg);color:var(--acc-t)}
.tag-v{background:#D4EDDA;color:#1B6B2F}
.tag-m{background:#EEE0FA;color:#5B2C8A}
.tag-a{background:#CCE8FF;color:#0A4A80}
.msg-err{padding:8px 12px;background:var(--acc-bg);color:var(--acc-t);border-radius:var(--radius);font-size:13px;margin-top:8px}
label{font-size:11px;color:var(--gris);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.fg{margin-bottom:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:215px;background:var(--negro);display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;overflow-x:hidden;transition:width .25s ease,min-width .25s ease}
.sidebar.collapsed{width:0;min-width:0;padding:0;border:none;overflow:hidden}
.sidebar.collapsed .sb-logo h2,
.sidebar.collapsed .sb-logo p,
.sidebar.collapsed .sb-nav a span,
.sidebar.collapsed .sb-ley,
.sidebar.collapsed .sb-foot .esp-name,
.sidebar.collapsed .sb-foot .esp-role,
.sidebar.collapsed .sb-foot button span,
.sidebar.collapsed .sb-logo-text{display:none}
.sidebar.collapsed .sb-logo{padding:.6rem .5rem}
.sidebar.collapsed .sb-logo img{width:36px;height:36px}
.sidebar.collapsed .sb-nav a{padding:10px 0;justify-content:center}
.sidebar.collapsed .sb-nav a i{font-size:20px;margin:0}
.sidebar.collapsed .sb-foot{padding:.5rem}
.sidebar.collapsed .sb-foot button{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%}
.sidebar.collapsed .sb-sep{margin:.3rem .5rem}
.sidebar.collapsed .sb-logo-img{margin:0 auto}
.sb-toggle{position:absolute;top:50%;right:-12px;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--negro);border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;transition:transform .25s}
.sb-toggle i{font-size:13px;color:rgba(249,239,232,.7);transition:transform .25s}
.sidebar.collapsed .sb-toggle i{transform:rotate(180deg)}
@media(max-width:600px){
  .sidebar{width:52px;min-width:52px}
  .sidebar.expanded{width:215px;min-width:215px}
  .sidebar .sb-logo h2,.sidebar .sb-logo p,.sidebar .sb-nav a span,.sidebar .sb-ley,.sidebar .sb-foot .esp-name,.sidebar .sb-foot .esp-role{display:none}
  .sidebar.expanded .sb-logo h2,.sidebar.expanded .sb-logo p,.sidebar.expanded .sb-nav a span,.sidebar.expanded .sb-ley,.sidebar.expanded .sb-foot .esp-name,.sidebar.expanded .sb-foot .esp-role{display:block}
  .sidebar .sb-logo{padding:.6rem .5rem}
  .sidebar .sb-logo img{width:36px;height:36px}
  .sidebar.expanded .sb-logo img{width:64px;height:64px}
  .sidebar .sb-nav a{padding:10px 0;justify-content:center}
  .sidebar.expanded .sb-nav a{padding:9px 1.1rem;justify-content:flex-start}
  .sidebar .sb-nav a i{font-size:20px;margin:0}
  .sidebar .sb-foot{padding:.5rem}
  .sidebar .sb-foot button{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .sidebar.expanded .sb-foot{padding:.8rem 1rem}
  .sidebar.expanded .sb-foot button{width:100%;height:auto;padding:5px 10px;border-radius:var(--radius)}
}
.sb-logo{padding:1.1rem 1rem;border-bottom:.5px solid rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;gap:8px}
.sb-logo img{width:66px;height:66px;border-radius:50%;object-fit:cover;border:2px solid var(--rosa-borde)}
.sb-logo h2{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--rosa);text-align:center}
.sb-logo p{font-size:9px;color:var(--gris-c);letter-spacing:.8px;text-transform:uppercase;text-align:center}
.sb-nav a{display:flex;align-items:center;gap:9px;padding:9px 1.1rem;font-size:13px;color:rgba(249,239,232,.6);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.sb-nav a.sub-item{padding-left:2rem;font-size:12px;color:rgba(249,239,232,.45)}
.sb-nav a.sub-item.active{color:rgba(249,239,232,.9);background:rgba(232,117,138,.08);border-left-color:rgba(232,117,138,.6)}
.sb-nav a:hover{color:var(--rosa);background:rgba(255,255,255,.05)}
.sb-nav a.active{color:var(--rosa);background:rgba(232,117,138,.12);border-left-color:var(--acc);font-weight:500}
.sb-nav a i{font-size:16px}
.sb-sep{height:.5px;background:rgba(255,255,255,.07);margin:4px 1rem}
.sb-ley{padding:.6rem 1rem;border-top:.5px solid rgba(255,255,255,.07)}
.sb-ley-i{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(249,239,232,.45);margin-bottom:3px}
.sb-ley-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sb-foot{padding:.8rem 1rem;border-top:.5px solid rgba(255,255,255,.07)}
.main{flex:1;height:100vh;overflow-y:auto;overflow-x:auto;min-width:0}
.topbar{background:#fff8f5;border-bottom:.5px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--negro-s)}
.content{padding:1rem;min-width:0}
/* CAL */
.mes-nav{display:flex;align-items:center;gap:6px;margin-bottom:.7rem}
.mes-nav button{padding:4px 8px;font-size:13px;background:transparent;border-color:var(--border2)}
.mes-nav button:hover{background:var(--rosa-med)}
.mes-t{font-family:'Playfair Display',serif;font-size:15px;color:var(--negro-s);min-width:140px;text-align:center}
.sem-tabs{display:flex;gap:3px;margin-bottom:.6rem;flex-wrap:wrap}
.sem-tab{padding:4px 10px;font-size:11px;border-radius:20px;border:.5px solid var(--border2);background:#fff8f5;color:var(--gris);cursor:pointer;line-height:1.4;text-align:center;transition:all .15s}
.sem-tab:hover{background:var(--rosa-med)}
.sem-tab.active{background:var(--negro);color:var(--rosa);border-color:var(--negro);font-weight:500}
.dia-tabs{display:flex;gap:3px;margin-bottom:.6rem;background:var(--rosa-med);padding:4px;border-radius:var(--radius-lg);overflow-x:auto}
.dia-tab{flex:1;min-width:58px;padding:5px 3px;font-size:11px;border-radius:var(--radius);border:none;background:transparent;color:var(--gris);cursor:pointer;text-align:center;line-height:1.3;transition:background .15s}
.dia-tab:hover{background:#fff8f5}
.dia-tab.active{background:#fff8f5;color:var(--negro-s);font-weight:500}
.dia-tab .dn{font-size:9px;color:var(--gris-c);text-transform:uppercase;letter-spacing:.4px}
.dia-tab .dd{font-size:14px;font-weight:500;display:block}
.dia-tab.active .dn{color:var(--rosa-osc)}
.dia-tab.hoy .ddw{background:var(--acc);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:1px auto 0;font-size:12px}
/* GRILLA */
.gw{overflow-x:auto;width:100%;-webkit-overflow-scrolling:touch;display:block;border:.5px solid var(--border);border-radius:var(--radius-lg);background:#fff8f5}
.gt{background:#fff8f5}
.gt table{width:100%;border-collapse:collapse;font-size:11px;min-width:1500px}
.gt thead th{background:var(--rosa-med);padding:5px 5px;font-weight:500;color:var(--negro-s);border-right:.5px solid var(--rosa-borde);border-bottom:.5px solid var(--rosa-borde);text-align:center;white-space:nowrap;letter-spacing:.2px;position:sticky;top:0;z-index:2}
.gt thead th:first-child{text-align:left;min-width:155px;position:sticky;left:0;z-index:4;background:var(--rosa-med);top:0}
.gt tbody td{border-right:.5px solid var(--rosa-borde);border-bottom:.5px solid var(--rosa-borde);padding:2px 2px;vertical-align:top;min-width:74px;max-width:88px}
.gt tbody td:first-child{background:var(--rosa-med);position:sticky;left:0;z-index:1;min-width:155px;padding:5px 8px;border-right:.5px solid var(--border2)}
.gt tbody tr:last-child td{border-bottom:none}
.gt tbody td:last-child{border-right:none}
.gt tbody td.fh{background:rgba(212,150,122,.07)}
/* CHIPS */
.pc{border-radius:5px;padding:3px 4px;margin-bottom:2px;cursor:pointer;line-height:1.3;position:relative}
.pc:hover{opacity:.82}
.pc.fuera-h{border-left-color:#999 !important;background:repeating-linear-gradient(135deg,#f0f0ee,#f0f0ee 4px,#e8e8e5 4px,#e8e8e5 8px) !important;color:#666 !important;opacity:.8}
.pc.fuera-h .pn{color:#555}
.pc.fuera-h .ps{color:#888}
.pn{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:82px}
.ps{font-size:9px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:82px;margin-top:1px}
.ch-psi{background:var(--c-psi);color:var(--c-psi-t);border-left:3px solid var(--c-psi-b)}
.ch-psped{background:var(--c-psped);color:var(--c-psped-t);border-left:3px solid var(--c-psped-b)}
.ch-fono{background:var(--c-fono);color:var(--c-fono-t);border-left:3px solid var(--c-fono-b)}
.ch-psiq{background:var(--c-psiq);color:var(--c-psiq-t);border-left:3px solid var(--c-psiq-b)}
.ch-otro{background:var(--c-otro);color:var(--c-otro-t);border-left:3px solid var(--c-otro-b)}
.ch-aviso{opacity:.7;text-decoration:line-through}
.ch-ausente{opacity:.5;text-decoration:line-through}
.ch-v::after{content:'◈';font-size:8px;margin-left:2px;opacity:.7}
.ab{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%}
.ab-p{background:#28A745}.ab-a{background:#FFC107}.ab-s{background:#DC3545}
/* MULTI-ESP BADGE */
.multi-badge{position:absolute;top:2px;right:2px;background:var(--acc);color:#fff;border-radius:50%;width:10px;height:10px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;z-index:2}
/* USUARIOS */
.ucard{border:.5px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1.1rem;background:#fff8f5;transition:all .15s}
.ucard.esp{cursor:pointer}
.ucard.esp:hover{border-color:var(--rosa-osc);box-shadow:0 2px 8px rgba(212,150,122,.15)}
/* HORARIOS */
.hb{display:flex;align-items:center;gap:5px;margin-bottom:5px;background:var(--rosa-med);border-radius:var(--radius);padding:5px 8px}
.dp{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:500;background:#fff8f5;border:.5px solid var(--border2);color:var(--gris);cursor:pointer;transition:all .15s}
.dp.sel{background:var(--negro);color:var(--rosa);border-color:var(--negro)}
/* HC */
.hc-i{border:.5px solid var(--border);border-radius:var(--radius-lg);padding:.9rem;cursor:pointer;background:#fff8f5;transition:all .15s}
.hc-i:hover{border-color:var(--rosa-osc)}
.hc-e{border-left:3px solid var(--acc);padding:.5rem .7rem;margin-bottom:7px;background:var(--acc-bg);border-radius:0 var(--radius) var(--radius) 0}
.hc-m{font-size:10px;color:var(--gris);margin-top:3px}
.arch-i{display:flex;align-items:center;gap:7px;padding:5px 9px;background:var(--rosa-med);border-radius:var(--radius);margin-top:3px;font-size:11px}
.upz{border:1.5px dashed var(--rosa-borde);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;color:var(--gris);font-size:12px;transition:all .15s;margin-top:5px;background:var(--rosa)}
.upz:hover{border-color:var(--rosa-osc);color:var(--negro-s);background:var(--rosa-med)}
/* BANNERS */
.ban-adm{background:var(--rosa-med);color:var(--negro-s);padding:7px 12px;border-radius:var(--radius);margin-bottom:8px;font-size:12px;display:flex;align-items:center;gap:7px;border-left:3px solid var(--acc)}
.ban-multi{background:#EEE0FA;color:#5B2C8A;padding:7px 12px;border-radius:var(--radius);margin-bottom:8px;font-size:12px;display:flex;align-items:center;gap:7px;border-left:3px solid #9B59D0}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(26,16,16,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.mol{background:#fff8f5;border-radius:var(--radius-lg);padding:1.4rem;width:520px;max-width:95vw;max-height:90vh;overflow:auto}
.moh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;border-bottom:.5px solid var(--border);padding-bottom:.7rem}
.moh h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--negro-s)}
.asb{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;border:.5px solid var(--border2);background:#fff8f5;color:var(--negro-s);cursor:pointer;transition:all .15s}
.asb.ap{background:#D4EDDA;color:#1B6B2F;border-color:#28A745}
.asb.aa{background:#FFF3CC;color:#7A5C00;border-color:#E6A800}
.asb.as{background:#FDEAED;color:#7A1F38;border-color:#E8758A}
/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--rosa)}
.lc{background:#fff8f5;border-radius:var(--radius-lg);padding:1.75rem;width:390px;max-width:95vw;border:.5px solid var(--border)}
.ll{text-align:center;margin-bottom:1.25rem}
.ll img{width:85px;height:85px;border-radius:50%;object-fit:cover;border:2px solid var(--rosa-borde)}
.ll h1{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;color:var(--negro-s);margin-top:8px}
.ll p{font-size:10px;color:var(--gris);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ltabs{display:flex;gap:3px;margin-bottom:1.1rem;background:var(--rosa-med);border-radius:var(--radius);padding:4px}
.ltb{flex:1;border:none;border-radius:8px;padding:7px;font-size:13px;background:transparent;color:var(--gris);cursor:pointer;font-family:'Lato',sans-serif;transition:all .15s}
.ltb.active{background:#fff8f5;color:var(--negro-s);font-weight:500}
/* SEARCH HC */
.hc-search-wrap{position:relative;margin-bottom:1rem}
.hc-search-wrap input{padding-left:34px}
.hc-search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gris);font-size:16px}
/* MULTI-ESP PILL */
.mesp-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;margin-right:3px;margin-top:3px}

/* Loading spinner */
#loading-screen{position:fixed;inset:0;background:#F9EFE8;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999}

/* ── NUEVA GRILLA AGENDA GENERAL ── */
.ag-wrap-outer{overflow-x:auto;width:100%;-webkit-overflow-scrolling:touch}
.ag-wrap{display:flex;flex-direction:column;gap:6px;padding:2px;width:max-content;min-width:100%}
.ag-fila{display:flex;flex-direction:row;align-items:stretch;border-radius:8px;overflow:visible;border:1.5px solid rgba(180,120,100,.2);background:#fff8f5}
.ag-esp{min-width:148px;width:148px;flex-shrink:0;padding:6px 10px;background:#F2D9CE;display:flex;flex-direction:column;justify-content:center;border-right:1.5px solid rgba(180,120,100,.25);position:sticky;left:0;z-index:3}
.ag-esp .ae-n{font-size:11px;font-weight:500;color:#3D2B2B}
.ag-esp .ae-s{font-size:9px;color:#9B7A6A;margin-top:1px}
.ag-esp .ae-h{font-size:8px;color:#D4967A;margin-top:3px;font-weight:500}
.ag-turnos{display:flex;flex-direction:row;flex-wrap:nowrap;flex:1;gap:2px;padding:3px;align-items:stretch}
.ag-chip{display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border:1.5px solid;flex-shrink:0;cursor:pointer;position:relative;transition:filter .15s}
.ag-chip:hover{filter:brightness(.92)}
.ag-chip .ach{font-size:10px;font-weight:700;padding:3px 5px;text-align:center;letter-spacing:.2px;white-space:nowrap}
.ag-chip .acp{background:#fff;padding:3px 5px 2px;font-size:11px;font-weight:500;color:#1a1010;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;line-height:1.2}
.ag-chip .aco{background:#fff;padding:0 5px 3px;font-size:9px;color:#999;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-libre{display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border:1.5px solid #C2185B;flex-shrink:0;opacity:.45}
.ag-libre .alh{font-size:10px;font-weight:700;padding:3px 5px;text-align:center;background:#F48FB1;color:#6B0F2A;letter-spacing:.2px}
.ag-libre .alp{background:#FDEAED;padding:3px 5px;font-size:9px;color:#C2185B;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;font-style:italic}
/* Celda fuera del horario declarado por el especialista */
.ag-libre-fuera{border-color:#999 !important;opacity:.35}
.ag-libre-fuera .alh{background:#bbb !important;color:#444 !important}
.ag-libre-fuera .alp{background:#eee !important;color:#777 !important}
.ag-psi{border-color:#CC8800}.ag-psi .ach{background:#FFE066;color:#5C4200}
.ag-psped{border-color:#1A8A3E}.ag-psped .ach{background:#6FCF97;color:#0B4A1F}
.ag-fono{border-color:#7B2FD4}.ag-fono .ach{background:#C39BF5;color:#3A1070}
.ag-psiq{border-color:#C2185B}.ag-psiq .ach{background:#F48FB1;color:#6B0F2A}
.ag-otro{border-color:#1565C0}.ag-otro .ach{background:#64B5F6;color:#0A3060}
.ag-chip.ch-aviso .acp{text-decoration:line-through;color:#aaa}
.ag-chip.ch-ausente .acp{text-decoration:line-through;color:#ccc}
.ag-chip.ch-aviso .ach,.ag-chip.ch-ausente .ach{opacity:.6}
.ag-ab{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%}
.ag-ab-p{background:#28A745}.ag-ab-a{background:#FFC107}.ag-ab-s{background:#DC3545}

/* Fila ausente — gris completo */
.ag-fila-ausente{opacity:1}
.ag-fila-ausente .ag-esp{background:#E5E0DC}
.ag-ausente-banda{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:repeating-linear-gradient(135deg,#ddd,#ddd 8px,#e8e8e5 8px,#e8e8e5 16px);color:#777;font-size:12px;font-weight:500;padding:14px}
.ag-btn-ausencia{border:none;background:rgba(180,120,100,.12);color:#7A6060;font-size:9px;padding:3px 7px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;margin-top:4px;transition:background .15s}
.ag-btn-ausencia:hover{background:rgba(180,120,100,.22)}
.ag-fila-ausente .ag-btn-ausencia{background:rgba(120,120,120,.18);color:#555}
.ag-fila-ausente .ag-btn-ausencia:hover{background:rgba(120,120,120,.3)}

/* Turno marcado como "no atiende" — gris */
.ag-chip-noatiende{border-color:#999 !important;opacity:.6}
.ag-chip-noatiende .ach{background:#999 !important;color:#fff !important}
.ag-chip-noatiende .acp{background:#eee !important;color:#777 !important;text-decoration:line-through}

/* Slot quincenal libre — verde claro, sin datos */
.ag-chip-libre{border-color:#4CAF50 !important;flex-shrink:0;cursor:pointer}
.ag-chip-libre .ach{background:#81C784 !important;color:#1B5E20 !important}
.ag-chip-libre .acp{background:#F1F8E9 !important;color:#4CAF50 !important;font-style:italic}
.ag-chip-libre .aco{background:#F1F8E9 !important;color:#66BB6A !important}
/* Turno quincenal confirmado — verde más sólido */
.ag-chip-quincenal .ach{background:#388E3C !important;color:#fff !important}
.ag-chip-quincenal .acp{background:#E8F5E9 !important;color:#1B5E20 !important}
.ag-chip-quincenal .aco{background:#E8F5E9 !important;color:#388E3C !important}
</style>

let db = null;

let saveTimeout = null;


// Firebase convierte arrays vacíos en null — esto los restaura
function sanitizarHistorias(historias) {
  return (historias || []).map(h => ({
    ...h,
    grupoIds: Array.isArray(h.grupoIds) ? h.grupoIds : [],
    entradas: Array.isArray(h.entradas) ? h.entradas.map(e => ({
      ...e,
      archivos: Array.isArray(e.archivos) ? e.archivos : []
    })) : []
  }));
}

function initFirebase() {
  // Detectar si Firebase está configurado o si son valores placeholder
  const configured = FIREBASE_CONFIG.apiKey && 
                     !FIREBASE_CONFIG.apiKey.startsWith('TU_') &&
                     FIREBASE_CONFIG.databaseURL && 
                     !FIREBASE_CONFIG.databaseURL.includes('TU_PROJECT');

  if (!configured) {
    console.log('[Somos] Firebase sin configurar → modo local');
    cargarModoLocal();
    return;
  }

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    fbReady = true;
    console.log('[Somos] Firebase conectado');
    fbLoad();
  } catch(e) {
    console.warn('[Somos] Error Firebase, usando modo local:', e.message);
    cargarModoLocal();
  }
}

function cargarModoLocal() {
  state.users = JSON.parse(JSON.stringify(SEED_USERS));
  state.grupos = JSON.parse(JSON.stringify(SEED_GRUPOS));
  state.historias = sanitizarHistorias(JSON.parse(JSON.stringify(SEED_HISTORIAS)));
  state.overrides = {};
  state.loaded = true;
  // En móvil arrancar con sidebar colapsado
  if (window.innerWidth <= 600) state.sidebarOpen = false;
  render();
}

  // Timeout de seguridad: si Firebase no responde en 8 segundos, modo local
  const fbTimeout = setTimeout(() => {
    console.warn('[Somos] Firebase timeout → modo local');
    if (!state.loaded) cargarModoLocal();
  }, 8000);

  db.ref('somos').once('value').then(snap => {
    clearTimeout(fbTimeout);
    const data = snap.val();
    if (!data || !data.users || data.users.length === 0) {
      // Primera vez: cargar datos del Excel
      console.log('[Somos] Primera vez: importando datos...');
      const seedData = {
        users: SEED_USERS,
        grupos: SEED_GRUPOS,
        historias: SEED_HISTORIAS,
        overrides: {}
      };
      db.ref('somos').set(seedData).then(() => {
        state.users = JSON.parse(JSON.stringify(SEED_USERS));
        state.grupos = JSON.parse(JSON.stringify(SEED_GRUPOS));
        state.historias = JSON.parse(JSON.stringify(SEED_HISTORIAS));
        state.overrides = {};
        state.loaded = true;
        render();
        console.log('[Somos] Datos importados correctamente');
      });
    } else {
      // Cargar datos existentes
      state.users = data.users || [];
      state.grupos = data.grupos || [];
      state.historias = sanitizarHistorias(data.historias || []);
      state.overrides = data.overrides || {};
      state.loaded = true;
      render();
      console.log('[Somos] Datos cargados desde Firebase');
    }

    // Escuchar cambios en tiempo real
    db.ref('somos').on('value', snap => {
      const d = snap.val();
      if (!d || !state.loaded) return;
      // Ignorar el evento si lo generamos nosotros mismos
      if (window._ignorarProximoListener) {
        window._ignorarProximoListener = false;
        return;
      }
      // Actualizar solo los datos preservando toda la UI
      const prev_user = state.currentUser?.id;
      const uiState = {
        view: state.view,
        hcActivo: state.hcActivo,
        hcQ: state.hcQ,
        viendoEspId: state.viendoEspId,
        mes: state.mes,
        sem: state.sem,
        dia: state.dia,
        modal: state.modal,
        sidebarOpen: state.sidebarOpen
      };
      // Actualizar datos
      state.users = d.users || [];
      state.grupos = d.grupos || [];
      state.historias = sanitizarHistorias(d.historias || []);
      state.overrides = d.overrides || {};
      // Restaurar UI exactamente
      Object.assign(state, uiState);
      // Restaurar sesión
      if (prev_user) {
        state.currentUser = state.users.find(u => u.id === prev_user) || state.currentUser;
      }
      // Solo re-renderizar contenido si no estamos en login ni en HC
      if (state.view !== 'login' && !state.hcActivo) {
        rC();
      }
    });
  }).catch(err => {
    clearTimeout(fbTimeout);
    console.error('[Somos] Error Firebase:', err);
    cargarModoLocal();
  });
}

// Guardar con debounce (evita guardar en cada tecla)
function fbSave() {
  if (!fbReady || !db) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    window._ignorarProximoListener = true;
    const data = {
      users: state.users,
      grupos: state.grupos,
      historias: state.historias,
      overrides: state.overrides
    };
    db.ref('somos').set(data).catch(err => {
      console.error('[Somos] Error al guardar:', err);
      window._ignorarProximoListener = false;
    });
  }, 400);
}

function gSlots(paso=40){const s=[];let h=9,m=0;while(h<20||(h===20&&m===0)){s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);m+=paso;if(m>=60){m-=60;h++}}return s}

function cc(sp){if(!sp)return'ch-otro';const s=sp.toLowerCase();if(s.includes('psicolog'))return'ch-psi';if(s.includes('psicopedag'))return'ch-psped';if(s.includes('fono'))return'ch-fono';if(s.includes('psiquiat'))return'ch-psiq';return'ch-otro'}
function col(sp){const m={'ch-psi':'#E6A800','ch-psped':'#28A745','ch-fono':'#9B59D0','ch-psiq':'#E05C7A','ch-otro':'#3A9FE0'};return m[cc(sp)]||'#3A9FE0'}
function ff(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function pf(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function semsM(y,m){const r=[];const u=new Date(y,m+1,0);let a=new Date(y,m,1);let dw=a.getDay();if(dw===0)dw=7;a.setDate(a.getDate()-(dw-1));while(a<=u){r.push(new Date(a));a.setDate(a.getDate()+7)}return r}
function diasS(lun){const r=[];for(let i=0;i<6;i++){const d=new Date(lun);d.setDate(d.getDate()+i);r.push(d)}return r}
function gRec(base,rec,n=260){const r=[base];if(rec==='Única vez')return r;const p=rec==='Semanal'?7:14;let d=pf(base);for(let i=0;i<n;i++){d=new Date(d);d.setDate(d.getDate()+p);r.push(ff(d))}return r}

// Genera slots cada 20 min desde hora inicio hasta hora fin
function slotsEntreFranjas(esp, dow){
  const franjas=(esp.horarios||[]).filter(h=>h.dow===dow);
  if(!franjas.length) return [];
  // Tomar inicio más temprano y fin más tardío
  const inicio=franjas.map(h=>h.horaInicio).sort()[0];
  const fin=franjas.map(h=>h.horaFin).sort().reverse()[0];
  // Generar slots de 20 en 20 desde 09:00 hasta el fin del especialista
  const slots=[];
  let h=9,m=0;
  const [fh,fm]=fin.split(':').map(Number);
  while(h<fh||(h===fh&&m<=fm)){
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m+=20;if(m>=60){m-=60;h++}
  }
  return slots;
}

function espBgColor(sp){
  if(!sp)return'#CCE8FF';
  const s=sp.toLowerCase();
  if(s.includes('psicolog'))return'#FFF3CC';
  if(s.includes('psicopedag'))return'#D4EDDA';
  if(s.includes('fono'))return'#EEE0FA';
  if(s.includes('psiquiat'))return'#FFD6E0';
  return'#CCE8FF';
}
function enHorario(esp,dow,slot){
  if(!esp.horarios||!esp.horarios.length)return true;
  const franjas=esp.horarios.filter(x=>x.dow===dow);
  if(!franjas.length)return false;
  // Está dentro si cae en CUALQUIERA de las franjas
  return franjas.some(h=>slot>=h.horaInicio&&slot<=h.horaFin);
}

// Retorna los turnos quincenales que están "libres" esa semana
// (la fecha está a exactamente 7 días de una fecha real del quincenal)
function getLibresQuincenales(fecha, espId=null){
  const libres=[];
  for(const g of state.grupos){
    if(espId&&g.especialistaId!==espId) continue;
    if(g.recurrencia!=='Quincenal') continue;
    if(g.esDescanso) continue;
    // Ver si esta fecha está a 7 días de alguna fecha real del turno
    const fechas=gRec(g.fechaBase,g.recurrencia);
    const fechaMs=pf(fecha).getTime();
    const esFechaReal=fechas.indexOf(fecha)>=0;
    if(esFechaReal) continue; // ya aparece como turno normal
    const ov=getOv(g.id,fecha);
    if(ov.cancelado) continue;
    // Buscar si hay una fecha real a 7 días antes o 7 días después
    const sieteAntes=ff(new Date(fechaMs - 7*24*60*60*1000));
    const sieteDespues=ff(new Date(fechaMs + 7*24*60*60*1000));
    const esLibre=fechas.indexOf(sieteAntes)>=0||fechas.indexOf(sieteDespues)>=0;
    if(esLibre){
      libres.push({...g, fecha, esLibreQuincenal:true, asistencia:null, noAtiende:false});
    }
  }
  return libres;
}

function getTurnos(fecha,espId=null){
  const dow=pf(fecha).getDay();const r=[];
  for(const g of state.grupos){
    if(espId&&g.especialistaId!==espId)continue;
    const fechas=gRec(g.fechaBase,g.recurrencia);
    if(fechas.indexOf(fecha)>=0){
      const ov=getOv(g.id,fecha);if(ov.cancelado)continue;
      // noAtiende: marcado puntual (override) O bloqueo recurrente fijo (g.esDescanso)
      r.push({...g,fecha,asistencia:ov.asistencia||null,noAtiende:!!ov.noAtiende||!!g.esDescanso});
    }
  }
  return r;
}

function rGrilla(fecha,esps){
  const dow=pf(fecha).getDay();
  const todosTurnos=getTurnos(fecha);

  const espsConTurnos=esps.filter(e=>{
    const tieneT=getTurnos(fecha,e.id).length>0;
    const tieneL=getLibresQuincenales(fecha,e.id).length>0;
    return tieneT||tieneL||atiende(e,dow);
  });

  if(espsConTurnos.length===0){
    return`<div style="text-align:center;padding:2.5rem;color:var(--gris)">
      <i class="ti ti-calendar-off" style="font-size:32px;opacity:.4"></i>
      <p style="margin-top:8px;font-family:'Playfair Display',serif">Sin turnos este día</p>
    </div>`;
  }

  function pasoEsp(specialty){
    if(!specialty) return 20;
    const s=specialty.toLowerCase();
    if(s.includes('fono')) return 30;
    if(s.includes('psicolog')) return 40;
    if(s.includes('psicopedag')) return 40;
    return 20;
  }

  function minutosDesde9(hora){
    const [h,m]=hora.split(':').map(Number);
    return (h-9)*60+m;
  }

  const FIN_DIA_MIN=660;
  const isAdmin=state.currentUser.role==='admin';

  return`<div class="ag-wrap-outer">
  <div class="ag-wrap">
  ${espsConTurnos.map(esp=>{
    const ausencia=getAusencia(esp.id,fecha);
    const cls=agCls(esp.specialty);

    if(ausencia){
      return`<div class="ag-fila ag-fila-ausente">
        <div class="ag-esp">
          <div class="ae-n">${esp.name}</div>
          <div class="ae-s">${esp.specialty||''}${esp.consultorio?' · '+esp.consultorio:''}</div>
          ${isAdmin?`<button class="ag-btn-ausencia" onclick="quitarAusencia('${esp.id}','${fecha}')"><i class="ti ti-rotate" style="font-size:10px"></i> Quitar ausencia</button>`:''}
        </div>
        <div class="ag-ausente-banda">
          <i class="ti ti-calendar-x" style="font-size:14px"></i>
          No atiende hoy${ausencia.motivo?' · '+ausencia.motivo:''}
        </div>
      </div>`;
    }

    const misTurnos=getTurnos(fecha,esp.id).sort((a,b)=>a.hora.localeCompare(b.hora));
    const misLibres=getLibresQuincenales(fecha,esp.id).sort((a,b)=>a.hora.localeCompare(b.hora));
    const paso=pasoEsp(esp.specialty);
    const franjas=(esp.horarios||[]).filter(h=>h.dow===dow);

    // Combinar turnos reales y libres quincenales en un mapa por hora
    const turnosPorHora={};
    misTurnos.forEach(t=>{ turnosPorHora[t.hora]={tipo:'turno',data:t}; });
    misLibres.forEach(t=>{ if(!turnosPorHora[t.hora]) turnosPorHora[t.hora]={tipo:'libre',data:t}; });

    const misHoras=misTurnos.map(t=>t.hora);
    const miHoraFin=misHoras[misHoras.length-1]||'09:00';
    const horaInicioEsp=misHoras[0]||'09:00';
    const resumen=franjas.length?franjas.map(h=>h.horaInicio+'–'+h.horaFin).join(' / '):(horaInicioEsp?horaInicioEsp+'–'+miHoraFin:'Sin turnos asignados');

    // Construir bloques: turnos + libres quincenales + disponibles
    const bloques=[];
    let cursorMin=0;

    // Ordenar todas las horas ocupadas (turno o libre) juntas
    const todasHoras=Object.keys(turnosPorHora).sort();

    todasHoras.forEach(hora=>{
      const inicioMin=minutosDesde9(hora);
      while(cursorMin+paso<=inicioMin){
        const hLibre=`${String(9+Math.floor(cursorMin/60)).padStart(2,'0')}:${String(cursorMin%60).padStart(2,'0')}`;
        bloques.push({tipo:'disponible',hora:hLibre,ancho:paso});
        cursorMin+=paso;
      }
      const entry=turnosPorHora[hora];
      bloques.push({tipo:entry.tipo,data:entry.data,hora,ancho:paso});
      cursorMin=inicioMin+paso;
    });

    // Rellenar hasta las 20:00
    while(cursorMin+paso<=FIN_DIA_MIN){
      const hLibre=`${String(9+Math.floor(cursorMin/60)).padStart(2,'0')}:${String(cursorMin%60).padStart(2,'0')}`;
      bloques.push({tipo:'disponible',hora:hLibre,ancho:paso});
      cursorMin+=paso;
    }

    return`<div class="ag-fila">
      <div class="ag-esp">
        <div class="ae-n">${esp.name}</div>
        <div class="ae-s">${esp.specialty||''}${esp.consultorio?' · '+esp.consultorio:''}</div>
        <div class="ae-h">${resumen}</div>
        ${isAdmin?`<button class="ag-btn-ausencia" onclick="marcarAusenciaPrompt('${esp.id}','${fecha}','${esp.name.replace(/'/g,"&#39;")}')"><i class="ti ti-calendar-x" style="font-size:10px"></i> Marcar ausente</button>`:''}
      </div>
      <div class="ag-turnos">
        ${bloques.map(b=>{
          const anchoPx=Math.round((b.ancho/20)*60);

          if(b.tipo==='turno'){
            const t=b.data;
            const a=t.asistencia;
            const isM=esMultiEsp(t.paciente);
            const claseNoAt=t.noAtiende?'ag-chip-noatiende':'';
            const claseQ=(!t.noAtiende&&t.recurrencia==='Quincenal')?'ag-chip-quincenal':'';
            return`<div class="ag-chip ${cls} ${claseQ} ${a?'ch-'+a:''} ${claseNoAt}" onclick="oM('ver-turno','${t.id}_${t.fecha}')" style="position:relative;width:${anchoPx}px;min-width:${anchoPx}px;max-width:${anchoPx}px" title="${t.paciente}${isM?' ★':''}${a?' | '+a:''}${t.noAtiende?' | No atiende':''}">
              ${a?`<div class="ag-ab ag-ab-${a==='presente'?'p':a==='aviso'?'a':'s'}"></div>`:''}
              ${isM?`<div style="position:absolute;top:2px;left:3px;font-size:8px;color:var(--acc)">★</div>`:''}
              <div class="ach">${t.noAtiende?'No atiende':t.hora+(t.modalidad==='Virtual'?' ◈':'')}</div>
              <div class="acp">${t.paciente}</div>
              ${t.obs||t.recurrencia==='Quincenal'?`<div class="aco">${t.recurrencia==='Quincenal'?'C/15':''}${t.obs?' '+t.obs:''}</div>`:''}
            </div>`;

          } else if(b.tipo==='libre'){
            const t=b.data;
            return`<div class="ag-chip ag-chip-libre" onclick="oM('nuevo-turno-libre','${t.especialistaId}_${t.hora}_${t.fecha}')" style="width:${anchoPx}px;min-width:${anchoPx}px;max-width:${anchoPx}px" title="Quincenal libre — clic para asignar paciente">
              <div class="ach">${t.hora}</div>
              <div class="acp">+ asignar</div>
              <div class="aco">C/15 · libre</div>
            </div>`;

          } else {
            // disponible normal
            const dentro=enHorario(esp,dow,b.hora);
            const claseGris=dentro?'':'ag-libre-fuera';
            return`<div class="ag-libre ${claseGris}" style="width:${anchoPx}px;min-width:${anchoPx}px;max-width:${anchoPx}px">
              <div class="alh">${b.hora}</div>
              <div class="alp">${dentro?'disponible':'sin horario'}</div>
            </div>`;
          }
        }).join('')}
      </div>
    </div>`;
  }).join('')}
  </div>
  </div>`;
}

function rHC(){
  if(state.hcActivo){
    const hc=state.historias.find(h=>h.id===state.hcActivo);

window.toggleDescansoUI = function(checked) {
  const lbl = document.getElementById('lbl-pac');
  const inp = document.getElementById('m-pac');
  if (lbl) lbl.textContent = checked ? 'Leyenda (ej: Descanso, Almuerzo)' : 'Paciente';
  if (inp) {
    inp.placeholder = checked ? 'Ej: Almuerzo, Descanso, Uso personal' : 'Nombre del paciente';
    if (checked && !inp.value) inp.value = 'No atiende';
  }
};

window.toggleNoAtiende = function(gid, fecha) {
  const k = `${gid}_${fecha}`;
  if (!state.overrides[k]) state.overrides[k] = {};
  state.overrides[k].noAtiende = !state.overrides[k].noAtiende;
  fbSave();
  closeModal();
  oM('ver-turno', `${gid}_${fecha}`);
};

window.sA=function(gid,f,val){const k=`${gid}_${f}`;if(!state.overrides[k])state.overrides[k]={};state.overrides[k].asistencia=val;closeModal();oM('ver-turno',`${gid}_${f}`);fbSave()}
window.cancelF=function(gid,f){const k=`${gid}_${f}`;if(!state.overrides[k])state.overrides[k]={};state.overrides[k].cancelado=true;closeModal();rC();fbSave()}
window.tEF=function(role){const g=document.getElementById('esg');if(g)g.style.display=role==='admin'?'none':'block'}
window.savT=function(eid){
  const esDescanso=document.getElementById('m-descanso')?document.getElementById('m-descanso').checked:false;
  const pacRaw=document.getElementById('m-pac').value.trim();
  const pac=esDescanso?(pacRaw||'No atiende'):pacRaw;
  const f=document.getElementById('m-f').value;
  const h=document.getElementById('m-h').value,espId=document.getElementById('m-e').value;
  const rec=document.getElementById('m-r').value,mod=document.getElementById('m-m').value;
  const mot=document.getElementById('m-mo').value.trim(),obs=document.getElementById('m-ob').value.trim();
  const msg=document.getElementById('mm');
  if(!pac||!f){msg.innerHTML='<div class="msg-err">Completá los campos obligatorios</div>';return}
  if(eid){
    const g=state.grupos.find(x=>x.id===eid);
    Object.assign(g,{paciente:pac,fechaBase:f,hora:h,especialistaId:espId,recurrencia:rec,modalidad:mod,motivo:mot,obs,esDescanso});
  }
  else{
    const nuevoGrupoId='g'+Date.now();
    state.grupos.push({id:nuevoGrupoId,paciente:pac,fechaBase:f,hora:h,especialistaId:espId,recurrencia:rec,modalidad:mod,motivo:mot,obs,esDescanso});
    // Solo crear historia clínica si es un paciente real (no un bloqueo de descanso)

window.eliminarGrupoTurno = function(gid, hcId) {
  const g = state.grupos.find(x => x.id === gid);
  if (!g) return;
  const esp = gU(g.especialistaId);
  const msg = g.esDescanso
    ? '¿Eliminar este bloqueo de "' + g.paciente + '" de ' + (esp ? esp.name : '') + '?'
    : '¿Quitar el turno con ' + (esp ? esp.name : 'este especialista') + '?\nNo afecta el resto de la historia del paciente.';
  if (!confirm(msg)) return;
  state.grupos = state.grupos.filter(x => x.id !== gid);
  for (const key of Object.keys(state.overrides)) {
    if (key.startsWith(gid + '_')) delete state.overrides[key];
  }
  if (hcId) {
    const hc = state.historias.find(h => h.id === hcId);
    if (hc && hc.grupoIds) {
      hc.grupoIds = hc.grupoIds.filter(id => id !== gid);
    }
  }
  closeModal();
  fbSave();
  rC();
};

window.eliminarPaciente = function(hcId, nombre) {
  if (!confirm('¿Eliminár a ' + nombre + ' y todos sus turnos?\nEsta acción no se puede deshacer.')) return;
  // Eliminar la historia clínica
  const hc = state.historias.find(h => h.id === hcId);
  if (hc) {
    // Eliminar todos los grupos de turno del paciente
    const gruposAEliminar = new Set(hc.grupoIds || []);
    state.grupos = state.grupos.filter(g => !gruposAEliminar.has(g.id));
    // Eliminar overrides relacionados
    for (const key of Object.keys(state.overrides)) {
      const gid = key.split('_')[0];
      if (gruposAEliminar.has(gid)) delete state.overrides[key];
    }
    // Eliminar la HC
    state.historias = state.historias.filter(h => h.id !== hcId);
  }
  state.hcActivo = null;
  fbSave();
  rC();
};

function rPsiq(){
  const MN2=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DN2=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const {y,m}=state.psiqMes;

  // Encontrar el especialista de psiquiatría (Daniel Olea o cualquier psiquiatra)
  const psiqEsp=state.users.filter(u=>u.role==='especialista'&&u.specialty&&u.specialty.toLowerCase().includes('psiquiat'));

  // Obtener todos los turnos del mes para psiquiatría
  function diasDelMes(y,m){
    const dias=[];const ultimo=new Date(y,m+1,0).getDate();
    for(let d=1;d<=ultimo;d++) dias.push(new Date(y,m,d));
    return dias;
  }
  const dias=diasDelMes(y,m);

  // Turnos del mes para todos los psiquiatras
  function turnosMes(){
    const t={};
    dias.forEach(d=>{
      const fs=ff(d);
      const ts=[];
      psiqEsp.forEach(esp=>{
        getTurnos(fs,esp.id).forEach(t=>ts.push(t));
        getLibresQuincenales(fs,esp.id).forEach(l=>ts.push(l));
      });
      if(ts.length>0) t[fs]=ts.sort((a,b)=>a.hora.localeCompare(b.hora));
    });
    return t;
  }
  const turnos=turnosMes();

  // Calcular primera celda del mes (para alinear la grilla)
  const primerDia=new Date(y,m,1).getDay(); // 0=dom...6=sáb

    <span style="font-size:11px;color:var(--gris)">${psiqEsp.length>0?psiqEsp.map(e=>e.name).join(', '):'Sin especialista de psiquiatría asignado'}</span>

          <div style="min-width:52px;padding:6px 8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:${isLibre?'#81C784':'#F48FB1'};color:${isLibre?'#1B5E20':'#6B0F2A'}">${t.hora}</div>
          <div style="flex:1;padding:5px 10px;display:flex;align-items:center;gap:8px;background:${isLibre?'#F1F8E9':'#fff8f5'}">
            <div style="flex:1">
              <div style="font-size:12px;font-weight:500;color:${isLibre?'#2E7D32':'var(--negro-s)'};font-style:${isLibre?'italic':'normal'}">${isLibre?t.paciente+' — libre esta semana':t.paciente}</div>
              <div style="font-size:10px;color:var(--gris);margin-top:1px">${t.recurrencia}${esp?' · '+esp.name:''}${isLibre?' · disponible para otro paciente':''}</div>
            </div>
            ${!isLibre?`<div style="display:flex;gap:4px">
              ${hc?`<button onclick="closeModal();irHC('${hc.id}')" style="border:none;background:var(--acc-bg);color:var(--acc-t);cursor:pointer;padding:3px 7px;border-radius:5px;font-size:10px"><i class="ti ti-file-medical" style="font-size:11px"></i></button>`:''}
              <button onclick="oM('ver-turno','${t.id}_${diaSeleccionado}')" style="border:none;background:var(--rosa-med);color:var(--negro-s);cursor:pointer;padding:3px 7px;border-radius:5px;font-size:10px"><i class="ti ti-dots" style="font-size:11px"></i></button>
            </div>`:'<div style="font-size:10px;color:#4CAF50;font-weight:500">Disponible ✓</div>'}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  `:`<div style="text-align:center;padding:2rem;color:var(--gris)">
    <i class="ti ti-hand-click" style="font-size:32px;opacity:.4"></i>
    <p style="margin-top:8px;font-family:'Playfair Display',serif">Hacé clic en un día para ver el detalle</p>
  </div>`}
  </div>`;
}

window.psiqMesAnt=function(){let{y,m}=state.psiqMes;m--;if(m<0){m=11;y--}state.psiqMes={y,m};state.psiqDiaActivo=null;rC()}
window.psiqMesSig=function(){let{y,m}=state.psiqMes;m++;if(m>11){m=0;y++}state.psiqMes={y,m};state.psiqDiaActivo=null;rC()}
window.psiqSelDia=function(fecha){state.psiqDiaActivo=fecha;rC()}

function rC(){const el=document.querySelector('.content');if(!el){render();return}const views={agenda:rAgP,'agenda-general':rAgG,psiquiatria:rPsiq,historias:rHC,usuarios:rUsers,equipo:rEquipo};el.innerHTML=(views[state.view]||rAgP)();if(state.modal)renderModal()}

initFirebase();
